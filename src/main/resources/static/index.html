<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- AUTH PAGE -->
<div id="auth-page" class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2">
                <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
            <h1>TaskFlow</h1>
        </div>
        <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('register')">Register</button>
        </div>
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="login-username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter password" required>
            </div>
            <div id="auth-error" class="error-msg hidden"></div>
            <button type="submit" class="btn-primary">Login</button>
        </form>
        <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-username" placeholder="Choose username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="Enter email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="Min 6 characters" required>
            </div>
            <div id="reg-error" class="error-msg hidden"></div>
            <button type="submit" class="btn-primary">Create Account</button>
        </form>
    </div>
</div>

<!-- MAIN APP -->
<div id="app-page" class="hidden">
    <header class="header">
        <div class="header-left">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2">
                <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
            <span class="logo-text">TaskFlow</span>
        </div>
        <div class="header-right">
            <div class="stats">
                <span class="stat todo-stat">📋 <span id="stat-todo">0</span> Todo</span>
                <span class="stat progress-stat">⚡ <span id="stat-progress">0</span> In Progress</span>
                <span class="stat done-stat">✅ <span id="stat-done">0</span> Done</span>
            </div>
            <div class="user-info">
                <span id="user-name"></span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
    </header>

    <div class="toolbar">
        <h2 class="board-title">My Board</h2>
        <button class="btn-add" onclick="openModal()">
            <span>+</span> New Task
        </button>
    </div>

    <div class="board">
        <div class="column">
            <div class="column-header todo-header">
                <span class="col-icon">📋</span>
                <span>TODO</span>
                <span class="col-count" id="count-todo">0</span>
            </div>
            <div class="task-list" id="list-todo"></div>
        </div>
        <div class="column">
            <div class="column-header progress-header">
                <span class="col-icon">⚡</span>
                <span>IN PROGRESS</span>
                <span class="col-count" id="count-inprogress">0</span>
            </div>
            <div class="task-list" id="list-inprogress"></div>
        </div>
        <div class="column">
            <div class="column-header done-header">
                <span class="col-icon">✅</span>
                <span>DONE</span>
                <span class="col-count" id="count-done">0</span>
            </div>
            <div class="task-list" id="list-done"></div>
        </div>
    </div>
</div>

<!-- TASK MODAL -->
<div id="task-modal" class="modal-overlay hidden" onclick="closeModalOutside(event)">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-title">New Task</h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <form onsubmit="handleSaveTask(event)">
            <input type="hidden" id="task-id">
            <div class="form-group">
                <label>Title *</label>
                <input type="text" id="task-title" placeholder="Task title" required maxlength="200">
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="task-desc" placeholder="Optional description" rows="3" maxlength="2000"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Priority</label>
                    <select id="task-priority">
                        <option value="LOW">🟢 Low</option>
                        <option value="MEDIUM" selected>🟡 Medium</option>
                        <option value="HIGH">🔴 High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="task-status">
                        <option value="TODO">📋 Todo</option>
                        <option value="IN_PROGRESS">⚡ In Progress</option>
                        <option value="DONE">✅ Done</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Due Date</label>
                <input type="datetime-local" id="task-due">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn-primary">Save Task</button>
            </div>
        </form>
    </div>
</div>

<!-- DELETE CONFIRM -->
<div id="delete-modal" class="modal-overlay hidden" onclick="closeDeleteOutside(event)">
    <div class="modal modal-sm">
        <h3>Delete Task?</h3>
        <p>This action cannot be undone.</p>
        <div class="modal-actions">
            <button class="btn-secondary" onclick="closeDeleteModal()">Cancel</button>
            <button class="btn-danger" onclick="confirmDelete()">Delete</button>
        </div>
    </div>
</div>

<script src="/app.js"></script>
</body>
</html>
