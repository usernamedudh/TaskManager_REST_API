spring.application.name=Task Manager REST API

# Database — SPRING_DATASOURCE_* vars are set by docker-entrypoint.sh from DATABASE_URL.
# Fallback values used for local development without Docker.
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:taskmanager}?sslmode=prefer
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:taskmanager-jwt-secret-key-this-must-be-at-least-256-bits-long-for-hs256!!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Actuator — Railway healthcheck hits /actuator/health
# Always return UP at the top level so Railway doesn't kill the container on slow DB
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.db.enabled=false
management.health.diskspace.enabled=false

# Server
server.port=${PORT:8080}
