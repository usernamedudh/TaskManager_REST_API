spring.application.name=Task Manager REST API

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5434/taskmanager}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:taskmanager-jwt-secret-key-this-must-be-at-least-256-bits-long-for-hs256!!!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Server
server.port=${PORT:8081}
